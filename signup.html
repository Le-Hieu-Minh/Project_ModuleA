<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tên Trang Của Bạn</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />

  <link rel="stylesheet" href="./assets/css/main.css" />
</head>

<body>
  <main class="min-h-screen flex flex-col md:flex-row">

    <!-- LEFT (IMAGE) -->
    <section class="w-full md:w-1/2 bg-gray-100 flex flex-col items-center justify-center p-6">

      <!-- Logo -->
      <div class=" mb-4 md:top-6 md:left-6">
        <img src="../assets/img/img_signup/3legant.png" alt="logo">
      </div>

      <!-- Image -->
      <img src="../assets/img/img_signup/Pasteimage.png" alt="chair" class="w-full max-w-xs md:max-w-md object-contain">
    </section>

    <!-- RIGHT (FORM) -->
    <section class="w-full md:w-1/2 flex items-center justify-center">
      <article class="w-full max-w-md px-6 py-8">

        <h2 class="text-2xl md:text-3xl font-semibold mb-4 text-center md:text-left">
          Sign In
        </h2>

        <p class="mb-6 text-gray-500 text-sm md:text-base text-center md:text-left">
          Don’t have an account yet?
          <a href="#" class="var(--secondary-green) font-semibold">Sign Up</a>
        </p>

        <form class="space-y-5">

          <input type="text" placeholder="Your username or email address" class="w-full border-b py-2 outline-none">

          <input type="password" placeholder="Password" class="w-full border-b py-2 outline-none">

          <div class="flex justify-between items-center text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox">
              Remember me
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button class="w-full bg-black text-white py-3 rounded">
            Sign In
          </button>

        </form>

      </article>
    </section>

  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
</body>




</html>
