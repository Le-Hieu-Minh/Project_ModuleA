<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />

  <link rel="stylesheet" href="./assets/css/main.css" />
</head>

<body>
  <main class="min-h-screen flex flex-col md:flex-row">

    <div class="w-full md:w-1/2 bg-[var(--neutral-02)] flex flex-col items-center justify-center ">

      <div class="mt-8 mb-4">
        <img src="../assets/img/img_signup/3legant.png" alt="logo">
      </div>

      <img src="../assets/img/img_signup/Pasteimage.png" alt="chair" class="w-full max-w-xs md:max-w-md object-contain">
    </div>

    <div class="w-full md:w-1/2 flex items-center justify-center">
      <div class="w-full max-w-md px-6 py-8 text-[var(--neutral-04)]">

        <div class="heading-4 md:text-3xl  mb-4 text-center text-left mb-1.5 text-[var(--neutral-07)]">
          Sign In
        </div>
        <p class="body-2-reg  text-left mb-8">
          Don’t have an account yet?
          <a href="#" class="text-[var(--secondary-green)] body-2-semibold">Sign Up</a>
        </p>

        <form class="space-y-5 ">

          <input type="text" placeholder="Your username or email address"
            class="flex flex-col items-start p-0 w-full h-10 gap-2.5 border-t-0 border-l-0 border-r-0 outline-none focus:ring-1 focus:ring-transparent border-b-[var(--neutral-03)] body-2-reg  mb-8">

          <div class="flex mb-8 items-center relative">
            <input type="password" placeholder="Password"
              class="flex flex-col items-start p-0 w-full h-10 gap-2.5 border-t-0 border-l-0 border-r-0 outline-none focus:ring-1 focus:ring-transparent border-b-[var(--neutral-03)] body-2-reg">
            <div class="absolute right-0">
              <img src="../assets/img/img_signup/eye.png " alt="chair">
            </div>
          </div>

          <div class="flex justify-between items-center text-sm mb-8">
            <label class="flex items-center gap-2 body-2-reg text-[var(--neutral-04)]">
              <input type="checkbox" class=" check-box ">
              Remember me
            </label>
            <a href="#" class="body-2-semibold text-[var(--neutral-07)]">Forgot password?</a>
          </div>

          <button
            class="flex w-full py-2.5 px-10 justify-center items-center gap-2 rounded-lg bg-[var(--neutral-07)] btn-s text-[#ffffff] ">
            Sign In
          </button>

        </form>

      </div>
    </div>

  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
</body>

</html>
